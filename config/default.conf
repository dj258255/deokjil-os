# Deokjil OS — 사용자 커스터마이징 설정
#
# 이 파일을 복사해 ~/.config/deokjil/user.conf 로 두고 자유롭게 편집하세요.
# user.conf 가 있으면 그 값이 우선합니다(default.conf 는 건드리지 않음).
#
# 모든 값은 "비워두면 변경 안 함"이 원칙입니다. 원하는 것만 바꾸세요.

# ── 외형 ─────────────────────────────────────────────
# 다크 모드 (true / false)
DEOKJIL_DARK="true"

# GTK 테마 이름 (설치된 테마. 비우면 변경 안 함)
DEOKJIL_GTK_THEME=""

# 아이콘 테마 이름 (비우면 변경 안 함)
DEOKJIL_ICON_THEME=""

# 강조색 — blue teal green yellow orange red pink purple slate (Ubuntu 24.04+)
# 비우면 변경 안 함
DEOKJIL_ACCENT="purple"

# ── 배경 ─────────────────────────────────────────────
# 배경화면: wallpapers/ 안의 파일명 또는 절대경로. 비우면 변경 안 함
DEOKJIL_WALLPAPER=""

# ── 마스코트 (선택) ──────────────────────────────────
# mascots/ 안의 폴더명. 비우면 마스코트 없음(중립 기본 = 자유의 핵심)
# 사용자가 자신의 캐릭터 팩을 mascots/ 에 추가해 쓸 수 있습니다.
DEOKJIL_MASCOT=""
